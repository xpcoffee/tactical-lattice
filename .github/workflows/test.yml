name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build CI image
        run: docker build -f ci/Dockerfile -t tactical-lattice-ci .

      - name: Run E2E tests
        run: docker run --rm tactical-lattice-ci
